
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html,
body,
#mainWrapper {
  width: 100%;
  height: 100%;
}
.sliderContainer {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 32px;
  background-color: black;
}

.slider {
  width: 75%;
  height: 85%;
  border: solid;
  border-radius: 50px;
  background-color: skyblue;
  transition: all 0.3s linear;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

}

button {
  border: solid;
  padding: 3px 10px;
  border-radius: 10px;
  cursor: pointer;
}
    </style>
  </head>
  <body>
    <div id="mainWrapper">
      <div class="sliderContainer">
        <button class="prev" title="prev">⏮️</button>
        <div class="slider"></div>
        <button class="next" title="next">⏭️</button>
      </div>
    </div>

    <script>
     let slider = document.querySelector(".slider");
let prev = document.querySelector(".prev");
let next = document.querySelector(".next");

let bgImages = [
  "url('image1.png')",
  "url('image2.png')",
  "url('image3.png')",
  "url('image4.png')"
];

let currentIndexValue = 0;

// initial image
slider.style.backgroundImage = bgImages[currentIndexValue];
slider.style.backgroundSize = "cover";
slider.style.backgroundPosition = "center";

function prevFun() {
  currentIndexValue--;

  if (currentIndexValue < 0) {
    currentIndexValue = bgImages.length - 1;
  }

  slider.style.backgroundImage = bgImages[currentIndexValue];
}

function nextFun() {
  currentIndexValue++;

  if (currentIndexValue > bgImages.length - 1) {
    currentIndexValue = 0;
  }

  slider.style.backgroundImage = bgImages[currentIndexValue];
}

prev.addEventListener("click", prevFun);
next.addEventListener("click", nextFun);
    </script>
  </body>
</html>
